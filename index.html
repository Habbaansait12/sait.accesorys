<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habban Times</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      scroll-behavior: smooth;
    }

    header {
      background: black;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
    }

    header h1 {
      color: gold;
      margin: 0;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
      background: url('https://images.unsplash.com/photo-1518546305927-5a555bb7020d') center/cover;
    }

    .hero h2 {
      font-size: 40px;
    }

    .products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 30px;
    }

    .product {
      background: #1c1c1c;
      margin: 15px;
      padding: 15px;
      border-radius: 10px;
      width: 250px;
      text-align: center;
    }

    .product img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      background: gold;
      border: none;
      padding: 10px;
      margin-top: 10px;
      width: 100%;
      cursor: pointer;
    }

    #contact {
      background: #111;
      text-align: center;
      padding: 40px;
    }

    #contact a {
      color: lightgreen;
      text-decoration: none;
      font-size: 18px;
    }
  </style>
</head>

<body>

<header>
  <h1>⌚ Habban Times</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#products">Watches</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Luxury That Defines Time</h2>
  <p>Premium watches built to last</p>
</section>

<section id="products" class="products">

  <div class="product">
    <img src="https://images.unsplash.com/photo-1524592094714-0f0654e20314">
    <h3>Classic Gold Watch</h3>
    <p>$120</p>
    <button onclick="buy('Classic Gold Watch')">Buy Now</button>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1519741497674-611481863552">
    <h3>Silver Sport Watch</h3>
    <p>$95</p>
    <button onclick="buy('Silver Sport Watch')">Buy Now</button>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
    <h3>Black Luxury Watch</h3>
    <p>$150</p>
    <button onclick="buy('Black Luxury Watch')">Buy Now</button>
  </div>

</section>

<section id="contact">
  <h2>Contact Us</h2>

  <p>📞 +91 7411013048</p>
  <p>📧 mohammedhabbaan@gmail.com</p>
  <p>📍 Bangalore, India</p>

  <a href="https://wa.me/917411013048" target="_blank">
    💬 Chat on WhatsApp
  </a>
</section>

<script>
function buy(product) {
  window.location.href = "https://wa.me/917411013048?text=I want to buy " + product;
}
</script>

</body>
</html>
