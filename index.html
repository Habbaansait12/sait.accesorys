<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habban Timepieces</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0a0a0a;
  color: white;
}

/* HEADER */
header {
  position: fixed;
  width: 100%;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(6px);
  z-index: 1000;
}

.logo {
  font-family: 'Playfair Display', serif;
  color: gold;
  font-size: 24px;
}

nav a {
  color: #ccc;
  margin-left: 20px;
  text-decoration: none;
}

nav a:hover {
  color: gold;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
  url('https://images.unsplash.com/photo-1518546305927-5a555bb7020d?auto=format&fit=crop&w=1200&q=80') center/cover;
  text-align: center;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 50px;
}

.hero p {
  color: #bbb;
  margin: 10px 0 20px;
}

.hero button {
  padding: 12px 30px;
  background: gold;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

/* PRODUCTS */
.products {
  padding: 80px 20px;
  text-align: center;
}

.products h2 {
  font-family: 'Playfair Display', serif;
  margin-bottom: 40px;
}

.product-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.product {
  width: 260px;
  margin: 20px;
}

.product img {
  width: 100%;
  border-radius: 10px;
}

.product h3 {
  margin: 10px 0 5px;
}

.product button {
  background: gold;
  border: none;
  padding: 10px;
  width: 100%;
  cursor: pointer;
}

/* CONTACT */
#contact {
  padding: 60px 20px;
  text-align: center;
  border-top: 1px solid #222;
}

.whatsapp-btn {
  display: inline-block;
  background: #25D366;
  padding: 12px 20px;
  margin-top: 15px;
  border-radius: 8px;
  color: white;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #777;
}
</style>
</head>

<body>

<header>
  <div class="logo">HABBAN</div>
  <nav>
    <a href="#products">Watches</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <h1>Timeless Luxury</h1>
  <p>Discover premium watches crafted for elegance</p>
  <button onclick="document.getElementById('products').scrollIntoView()">
    Explore Collection
  </button>
</section>

<!-- PRODUCTS -->
<section id="products" class="products">
  <h2>Our Collection</h2>

  <div class="product-grid">

    <div class="product">
      <img src="https://images.unsplash.com/photo-1524592094714-0f0654e20314">
      <h3>Classic Gold Watch</h3>
      <button onclick="buy('Classic Gold Watch')">Buy Now</button>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1519741497674-611481863552">
      <h3>Silver Sport Watch</h3>
      <button onclick="buy('Silver Sport Watch')">Buy Now</button>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
      <h3>Black Luxury Watch</h3>
      <button onclick="buy('Black Luxury Watch')">Buy Now</button>
    </div>

  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>

  <p>📞 +91 7411013048</p>
  <p>📧 mohammedhabbaan@gmail.com</p>

  <a href="https://wa.me/917411013048" class="whatsapp-btn">
    Chat on WhatsApp
  </a>
</section>

<footer>
  © 2026 Habban Timepieces
</footer>

<script>
function buy(product) {
  window.location.href =
  "https://wa.me/917411013048?text=I want to buy " + product;
}
</script>

</body>
</html>
