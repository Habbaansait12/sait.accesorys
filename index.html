<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habban Timepieces</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #050505;
  color: white;
  overflow-x: hidden;
}

/* HEADER */
header {
  position: fixed;
  width: 100%;
  padding: 20px 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(12px);
  z-index: 1000;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  letter-spacing: 3px;
  color: gold;
}

.logo span {
  display: block;
  font-size: 10px;
  letter-spacing: 5px;
  color: #aaa;
}

nav a {
  color: #bbb;
  margin-left: 30px;
  text-decoration: none;
  transition: 0.3s;
}

nav a:hover {
  color: gold;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12%;
}

.hero-text {
  max-width: 450px;
  animation: fadeUp 1.2s ease;
}

.hero-text h1 {
  font-family: 'Playfair Display', serif;
  font-size: 60px;
}

.hero-text p {
  color: #aaa;
  margin: 20px 0;
}

.hero-text button {
  padding: 14px 32px;
  background: gold;
  border: none;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.hero-text button:hover {
  background: #d4af37;
}

/* HERO IMAGE */
.hero img {
  width: 380px;
  filter: drop-shadow(0 40px 80px rgba(0,0,0,0.9));
  animation: float 4s ease-in-out infinite;
}

/* FLOAT ANIMATION */
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

/* FADE ANIMATION */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* PRODUCTS */
.products {
  padding: 140px 20px;
  text-align: center;
}

.products h2 {
  font-family: 'Playfair Display', serif;
  font-size: 34px;
  margin-bottom: 80px;
}

.product-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.product {
  width: 260px;
  margin: 40px;
  transition: 0.4s;
}

.product:hover {
  transform: translateY(-12px);
}

.product img {
  width: 100%;
  border-radius: 12px;
  transition: 0.4s;
}

.product:hover img {
  transform: scale(1.08);
}

.product h3 {
  margin: 18px 0;
}

/* CONTACT */
#contact {
  padding: 120px 20px;
  text-align: center;
  border-top: 1px solid #222;
}

#contact h2 {
  font-family: 'Playfair Display', serif;
  font-size: 30px;
}

.whatsapp-btn {
  display: inline-block;
  background: #25D366;
  padding: 14px 25px;
  margin-top: 25px;
  border-radius: 10px;
  color: white;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 30px;
  color: #777;
  border-top: 1px solid #222;
}

/* MOBILE */
@media(max-width: 800px){
  .hero {
    flex-direction: column;
    text-align: center;
    padding-top: 120px;
  }

  .hero img {
    width: 260px;
    margin-top: 30px;
  }

  .hero-text h1 {
    font-size: 36px;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">
    HABBAN
    <span>TIMEPIECES</span>
  </div>
  <nav>
    <a href="#products">Collection</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">

  <div class="hero-text">
    <h1>Redefining Time.</h1>
    <p>Crafted for those who demand precision and prestige.</p>
    <button onclick="buy('Featured Watch')">Buy Now</button>
  </div>

  <img src="https://images.unsplash.com/photo-1547996160-81dfa63595aa">

</section>

<!-- PRODUCTS -->
<section id="products" class="products">
  <h2>Our Collection</h2>

  <div class="product-grid">

    <div class="product">
      <img src="https://images.unsplash.com/photo-1519741497674-611481863552">
      <h3>Silver Sport Watch</h3>
      <button onclick="buy('Silver Sport Watch')">Buy Now</button>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
      <h3>Black Luxury Watch</h3>
      <button onclick="buy('Black Luxury Watch')">Buy Now</button>
    </div>

  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>
  <p>📞 +91 7411013048</p>
  <p>📧 mohammedhabbaan@gmail.com</p>

  <a href="https://wa.me/917411013048" class="whatsapp-btn">
    Chat on WhatsApp
  </a>
</section>

<footer>
  © 2026 Habban Timepieces
</footer>

<script>
function buy(product) {
  window.location.href =
  "https://wa.me/917411013048?text=I want to buy " + product;
}
</script>

</body>
</html>
