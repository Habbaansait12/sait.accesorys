<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habban Timepieces</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0a0a0a;
  color: white;
}

/* HEADER */
header {
  position: fixed;
  width: 100%;
  padding: 20px 50px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  z-index: 1000;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  letter-spacing: 2px;
  color: gold;
}

.logo span {
  display: block;
  font-size: 10px;
  letter-spacing: 4px;
  color: #aaa;
  margin-top: -5px;
}

nav a {
  color: #bbb;
  margin-left: 25px;
  text-decoration: none;
  font-size: 14px;
}

nav a:hover {
  color: gold;
}

/* HERO (FEATURED PRODUCT) */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 10%;
}

.hero-text {
  max-width: 400px;
}

.hero-text h1 {
  font-family: 'Playfair Display', serif;
  font-size: 50px;
}

.hero-text p {
  color: #bbb;
  margin: 15px 0;
}

.hero-text button {
  padding: 12px 30px;
  background: gold;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

/* HERO IMAGE */
.hero img {
  width: 350px;
  filter: drop-shadow(0 20px 40px rgba(0,0,0,0.8));
}

/* COLLECTION */
.products {
  padding: 120px 20px;
  text-align: center;
}

.products h2 {
  font-family: 'Playfair Display', serif;
  margin-bottom: 60px;
}

.product-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.product {
  width: 250px;
  margin: 40px;
  transition: 0.3s;
}

.product:hover {
  transform: translateY(-10px);
}

.product img {
  width: 100%;
  border-radius: 10px;
}

.product h3 {
  margin: 15px 0;
}

.product button {
  background: gold;
  border: none;
  padding: 10px;
  width: 100%;
  cursor: pointer;
}

/* CONTACT */
#contact {
  padding: 100px 20px;
  text-align: center;
  border-top: 1px solid #222;
}

.whatsapp-btn {
  display: inline-block;
  background: #25D366;
  padding: 12px 20px;
  margin-top: 20px;
  border-radius: 8px;
  color: white;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #777;
}

/* MOBILE */
@media(max-width: 800px){
  .hero {
    flex-direction: column;
    text-align: center;
    padding-top: 100px;
  }

  .hero img {
    width: 250px;
    margin-top: 20px;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">
    HABBAN
    <span>TIMEPIECES</span>
  </div>
  <nav>
    <a href="#products">Collection</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HERO (FEATURED PRODUCT) -->
<section class="hero">

  <div class="hero-text">
    <h1>Precision. Power. Prestige.</h1>
    <p>Luxury watches crafted for timeless elegance</p>
    <button onclick="buy('Featured Watch')">Buy Now</button>
  </div>

  <img src="https://images.unsplash.com/photo-1524592094714-0f0654e20314">

</section>

<!-- COLLECTION -->
<section id="products" class="products">
  <h2>Our Collection</h2>

  <div class="product-grid">

    <div class="product">
      <img src="https://images.unsplash.com/photo-1519741497674-611481863552">
      <h3>Silver Sport Watch</h3>
      <button onclick="buy('Silver Sport Watch')">Buy Now</button>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
      <h3>Black Luxury Watch</h3>
      <button onclick="buy('Black Luxury Watch')">Buy Now</button>
    </div>

  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>
  <p>📞 +91 7411013048</p>
  <p>📧 mohammedhabbaan@gmail.com</p>

  <a href="https://wa.me/917411013048" class="whatsapp-btn">
    Chat on WhatsApp
  </a>
</section>

<footer>
  © 2026 Habban Timepieces
</footer>

<script>
function buy(product) {
  window.location.href =
  "https://wa.me/917411013048?text=I want to buy " + product;
}
</script>

</body>
</html>
